# DealSignals E2E tests
#
# Runs the Playwright suite against production after every push to main,
# and against a manually-supplied URL on workflow_dispatch.
#
# PR runs default to testing production too (override via workflow_dispatch
# if you want to test a specific preview URL). Once we have a stable
# Vercel preview URL pattern we can wire that back up.
#
# Required GitHub Secrets (all optional - specs auto-skip if missing):
#   E2E_FREE_EMAIL    - signed-up free-tier test account email
#   E2E_FREE_PASSWORD - that account's password

name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL to test against"
        required: false
        default: "https://www.dealsignals.app"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      # `npm ci` is strict about the lockfile - if it gets touchy on the
      # first run we can fall back to `npm install` while we sort it out.
      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      # Skip --with-deps. Ubuntu runners already have most of what
      # Chromium needs and the apt-get install can be slow.
      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Resolve test target URL
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            URL="${{ github.event.inputs.base_url }}"
          else
            URL="https://www.dealsignals.app"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Testing against: $URL"

      - name: Run Playwright tests
        env:
          E2E_BASE_URL: ${{ steps.target.outputs.url }}
          E2E_FREE_EMAIL: ${{ secrets.E2E_FREE_EMAIL }}
          E2E_FREE_PASSWORD: ${{ secrets.E2E_FREE_PASSWORD }}
        run: npx playwright test --reporter=list,html

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-${{ github.run_id }}
          path: e2e-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Summarize failures
        if: failure()
        run: |
          echo "## E2E failures :x:" >> "$GITHUB_STEP_SUMMARY"
          echo "Tested against: \`${{ steps.target.outputs.url }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the **playwright-report-${{ github.run_id }}** artifact above for traces, screenshots, and videos." >> "$GITHUB_STEP_SUMMARY"
